# Coturn configuration file

# Listening port
listening-port=3478

# Listening IP
# listening-ip=1.2.3.4

# External IP (if behind NAT)
# external-ip=1.2.3.4

# Credentials
user=family-safety-user:secret-password-123

# Realm
realm=familysafety.local

# SSL
# cert=/path/to/cert.pem
# pkey=/path/to/privkey.pem

# Security
fingerprint
lt-cred-mech
stale-nonce
no-stdout-log
log-file=/var/log/turnserver.log
