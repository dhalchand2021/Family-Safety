name: iOS IPA Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: parent-app/package.json

      - name: Install dependencies
        run: |
          cd parent-app
          npm install

      - name: Initialize Native Project (if missing)
        run: |
          cd parent-app
          if [ ! -d "ios" ] || [ ! -d "ios/FamilySafetyParent.xcodeproj" ]; then
            echo "Native iOS project missing. Attempting to generate in sibling directory..."
            cd ..
            npx react-native@0.72.3 init FamilySafetyParent --directory native-temp --skip-install --version 0.72.3 --npm --package-name com.familysafety.parent
            cp -r native-temp/ios parent-app/
            cp -r native-temp/android parent-app/
            rm -rf native-temp
            cd parent-app
            if [ ! -f "index.js" ]; then
              echo "import {AppRegistry} from 'react-native'; import App from './App'; import {name as appName} from './package.json'; AppRegistry.registerComponent(appName, () => App);" > index.js
            fi
            mkdir -p ios
            echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>method</key><string>ad-hoc</string><key>teamID</key><string>YOUR_TEAM_ID</string><key>uploadBitcode</key><false/><key>compileBitcode</key><false/><key>destination</key><string>export</string><key>signingStyle</key><string>automatic</string></dict></plist>' > ios/exportOptions.plist
          fi

      - name: Fix Reanimated for CI
        run: |
          cd parent-app
          npm install react-native-reanimated@3.3.0 --save-exact

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install CocoaPods with Boost Fix
        run: |
          cd parent-app/ios
          if [ -f "Podfile" ]; then
            # Fix for Boost checksum error in older RN versions
            # We use a known working mirror for boost
            export BOOST_URL="https://boostorg.jfrog.io/artifactory/main/release/1.76.0/source/boost_1_76_0.tar.bz2"
            pod install || (pod update boost-for-react-native && pod install) || (pod repo update && pod install)
          fi

      - name: Build iOS Archive
        run: |
          cd parent-app
          npx react-native bundle --dev false --platform ios --entry-file index.js --bundle-output ios/main.jsbundle --assets-dest ios
          cd ios
          if [ -d "FamilySafetyParent.xcworkspace" ]; then
            xcodebuild -workspace FamilySafetyParent.xcworkspace -scheme FamilySafetyParent -configuration Release -archivePath FamilySafetyParent.xcarchive archive
          else
            xcodebuild -project FamilySafetyParent.xcodeproj -scheme FamilySafetyParent -configuration Release -archivePath FamilySafetyParent.xcarchive archive
          fi

      - name: Export IPA
        run: |
          cd parent-app/ios
          if [ -f "exportOptions.plist" ]; then
             xcodebuild -exportArchive -archivePath FamilySafetyParent.xcarchive -exportOptionsPlist exportOptions.plist -exportPath build
          else
             echo "Error: exportOptions.plist missing. Cannot export IPA."
             exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FamilySafety-iOS-IPA
          path: parent-app/ios/build/*.ipa
          if-no-files-found: error
