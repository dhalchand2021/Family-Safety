name: iOS IPA Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: parent-app/package.json

      - name: Install dependencies
        run: |
          cd parent-app
          npm install

      - name: Initialize Native iOS Project (if missing)
        run: |
          cd parent-app
          if [ ! -d "ios/FamilySafetyParent.xcodeproj" ]; then
            echo "iOS native project missing. Initializing..."
            npx react-native bundle --platform ios --dev false --entry-file index.js --bundle-output ios/main.jsbundle --assets-dest ios
            # Note: In a real CI, you'd usually have the ios folder committed. 
            # This step is a fallback for src-only repos.
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install CocoaPods
        run: |
          cd parent-app/ios
          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Build iOS Archive
        run: |
          cd parent-app
          # Ensure bundle exists
          mkdir -p ios
          npx react-native bundle --dev false --platform ios --entry-file App.tsx --bundle-output ios/main.jsbundle --assets-dest ios
          
          # Attempt build if workspace exists
          if [ -d "ios/FamilySafetyParent.xcworkspace" ]; then
            cd ios
            xcodebuild -workspace FamilySafetyParent.xcworkspace -scheme FamilySafetyParent -configuration Release -archivePath FamilySafetyParent.xcarchive archive
          else
            echo "Skipping xcodebuild: xcworkspace not found. Please ensure the 'ios' folder is committed to the repository."
            exit 1
          fi

      - name: Export IPA
        run: |
          cd parent-app/ios
          if [ -d "FamilySafetyParent.xcarchive" ]; then
            xcodebuild -exportArchive -archivePath FamilySafetyParent.xcarchive -exportOptionsPlist exportOptions.plist -exportPath build
          else
            echo "Archive not found, skipping export."
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FamilySafety-iOS-IPA
          path: parent-app/ios/build/*.ipa
          if-no-files-found: error
