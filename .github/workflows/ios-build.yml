name: iOS IPA Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: parent-app/package.json

      - name: Install dependencies
        run: |
          cd parent-app
          npm install

      - name: Initialize Native Project (if missing)
        run: |
          cd parent-app
          if [ ! -d "ios" ] || [ ! -d "ios/FamilySafetyParent.xcodeproj" ]; then
            echo "Native iOS project missing. Attempting to generate..."
            # Move existing files to a temp location to avoid init conflicts
            mkdir ../tmp_src
            cp -r src ../tmp_src/
            cp App.tsx ../tmp_src/
            cp package.json ../tmp_src/
            
            # Run init to generate native folders
            npx react-native@0.72.3 init FamilySafetyParent --directory . --skip-install --version 0.72.3 --pm npm --force
            
            # Restore our source code
            cp -r ../tmp_src/src/* ./src/
            cp ../tmp_src/App.tsx ./App.tsx
            cp ../tmp_src/package.json ./package.json
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install CocoaPods
        run: |
          cd parent-app/ios
          pod install

      - name: Build iOS Archive
        run: |
          cd parent-app
          npx react-native bundle --dev false --platform ios --entry-file index.js --bundle-output ios/main.jsbundle --assets-dest ios
          cd ios
          xcodebuild -workspace FamilySafetyParent.xcworkspace -scheme FamilySafetyParent -configuration Release -archivePath FamilySafetyParent.xcarchive archive

      - name: Export IPA
        run: |
          cd parent-app/ios
          xcodebuild -exportArchive -archivePath FamilySafetyParent.xcarchive -exportOptionsPlist exportOptions.plist -exportPath build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FamilySafety-iOS-IPA
          path: parent-app/ios/build/*.ipa
          if-no-files-found: error
